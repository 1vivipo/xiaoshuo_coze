name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.2'
        
    - name: Build Debug APK
      uses: gradle/gradle-build-action@v2
      with:
        arguments: assembleDebug --stacktrace
        gradle-version: 8.2
      
    - name: Rename APK
      run: |
        mv app/build/outputs/apk/debug/app-debug.apk 笔核_v1.0.0.apk || true
      
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: BiHe-APK
        path: 笔核_v1.0.0.apk
        retention-days: 90
        
    - name: Create Release
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.0
        name: 笔核 v1.0.0
        files: 笔核_v1.0.0.apk
        body: |
          ## 笔核 v1.0.0
          
          ### 功能特性
          - 📝 创作中枢：支持小说、短剧、漫剧、推文四类项目
          - 🤖 AI续写：集成DeepSeek API，支持智能续写
          - 📚 大纲系统：四级大纲，支持拖拽排序
          - 🎬 漫剧制作：60集漫剧全流程制作
          - 🎥 推文视频：一键生成推文视频
          - 🔒 本地存储：所有数据本地加密存储
          
          ### 安装说明
          1. 下载APK文件
          2. 开启「安装未知来源应用」权限
          3. 安装并打开应用
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
